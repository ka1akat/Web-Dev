<h2>Albums</h2>

<div *ngIf="loading">Loading...</div>
<div *ngIf="!loading && error">{{ error }}</div>

<ul *ngIf="!loading && !error">
  <li *ngFor="let a of albums">
    <a [routerLink]="['/albums', a.id]">
      {{ a.id }}. {{ a.title }}
    </a>

    <button (click)="deleteAlbum(a.id)">Delete</button>
  </li>
</ul>
