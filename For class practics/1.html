<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shopping list</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
    <div class="container">
        <h1 class="brand">Shopping List</h1>
    </div>
</header>
<main class="container">
    <section class="card">
        <h2 class="title">Shopping List</h2>

        <form id="todoForm" class="form">
            <label class="sr-only" for="taskInput">New item</label>
            <input
                    id="taskInput"
                    class="input"
                    type="text"
                    placeholder="New item"
                    required
            />
            <button class="btn" type="submit">Add</button>
        </form>

        <ul id="todoList" class="list" ></ul>
    </section>
</main>
<script src="examples.js"></script>

<script src="script.js"></script>
<script src="examples.js"></script>
</body>
</html>
